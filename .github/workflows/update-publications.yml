name: Update publications

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-publications:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate publication page
        run: python scripts/update_publications.py

      - name: Commit updated publication page
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add _pages/publication.md
          git diff --cached --quiet && echo "No changes" || git commit -m "Auto-update publications"
          git push
